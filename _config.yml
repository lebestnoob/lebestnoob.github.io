title: LeBestNoob # name of the site
author: LeBestNoob # name of site's author
url: https://lebestnoob.github.io # root address of the site
description: > # description of the site (multiple lines allowed)
  Testing website
permalink: /:index
favicon: "./48655111.png" # relative path to site's favicon
# goat_counter: "yoursitename" # put your GoatCounter name if you want to use GoatCounter analytics

theme_config:
  back_home_text: "home" # customize text for homepage link in post layout
  date_format: "%d-%m-%Y" # customize how date is formatted
  show_description: false # show blog description in home page

sass:
  style: :compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-relative-links

relative_links:

  enabled: true

  collections: true

include:

  - index.md

  - CONTRIBUTING.md

  - README.md

  - LICENSE.md

  - COPYING.md

  - CODE_OF_CONDUCT.md

  - CONTRIBUTING.md

  - ISSUE_TEMPLATE.md

  - PULL_REQUEST_TEMPLATE.md

remote_theme: riggraz/no-style-please
