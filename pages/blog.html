<h1>Latest Posts</h1>
The land of (not) many ramblings

<div id="content"></div>

<script>document.title="Latest Posts";</script>
<script>
    fetchContent("/pages/posts/posts.json", function(res) {
        var posts = eval(res);

        posts.sort(compareDates)

        function compareDates(a,b) {
            var greaterDateA = Date.parse(a.updated) > Date.parse(a.date) ? Date.parse(a.updated) : Date.parse(a.date);

            var greaterDateB = Date.parse(b.updated) > Date.parse(b.date) ? Date.parse(b.updated) : Date.parse(b.date);

            return greaterDateB - greaterDateA; 
        }

        for(var j = 0; j < posts.length; j++) {
            var dateInfo = posts[j].updated ? 
                "Updated: " + posts[j].updated + ", Published: " + posts[j].date : " Published: " + posts[j].date;

            document.getElementById("content").innerHTML += "<a href='" + "/#posts/"+posts[j].href + "'>" + 
                "<h2>"+posts[j].title+"</h2>" + 
                posts[j].desc+"<br/>" + "<small>"+posts[j].author + " | " + dateInfo + "</small>" +
                "</a>";

        }
    });
</script>
