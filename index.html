<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  padding: 25px;
  background-color: white;
  color: black;
  font-size: 25px;
}

.dark-mode {
  background-color: black;
  color: white;
}
</style>
</head>
<body>

<h2>Toggle Dark/Light Mode</h2>
<p>Click the button to toggle between dark and light mode for this page.</p>

<input onclick="myFunction()" type="button" value="Toggle dark mode" id="myButton1"></input>

<script>
function myFunction() {
   var element = document.body;
   element.classList.toggle("dark-mode");
var elem = document.getElementById("myButton1"); 
if (elem.value=="Toggle white mode") elem.value = "Toggle dark mode";
    else elem.value = "Toggle white mode";
}
</script>

</body>
</html>
