<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html, html[data-theme=“light”] { 
	—light-text-color: rgb(72, 72, 74);
  	—link-color: rgb(0, 112, 201);
  	—main-background-color: rgb(255, 255, 255);
  	—main-text-color: rgb(51, 51, 51);
}

html[data-theme=“dark”] {
		—light-text-color: rgb(199, 199, 204);
  		—link-color: rgb( 100, 210, 255);
  		—main-background-color: rgb(28, 28, 30);
  		—main-text-color: rgb(229, 229, 234);
	}

@media (prefers-color-scheme: dark) {
	html, html[data-theme=“dark”] {
		—light-text-color: rgb(199, 199, 204);
  		—link-color: rgb( 100, 210, 255);
  		—main-background-color: rgb(28, 28, 30);
  		—main-text-color: rgb(229, 229, 234);
	}
	
	html[data-theme=“light”] { 
	—light-text-color: rgb(72, 72, 74);
  	—link-color: rgb(0, 112, 201);
  	—main-background-color: rgb(255, 255, 255);
  	—main-text-color: rgb(51, 51, 51);
	}
}
</style>
</head>
<body>

<h2>Light Mode</h2>
 <a href="index.html">Visit</a> 

<input onclick="myFunction()" type="button" value="Toggle dark mode" id="myButton1"></input>

<script>
function myFunction() {
   var element = document.body;
   element.classList.toggle("dark-mode");
var elem = document.getElementById("myButton1");
if (elem.value=="Toggle light mode") elem.value = "Toggle dark mode";
    else elem.value = "Toggle light mode";
}
</script>

</body>
</html>
